<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCXfa8We_LZvheRJW763NRUfPqryqg84YA",
  authDomain: "klintonhansgameover.firebaseapp.com",
  projectId: "klintonhansgameover",
  storageBucket: "klintonhansgameover.firebasestorage.app",
  messagingSenderId: "456440883345",
  appId: "1:456440883345:web:0130c2c5874a1dd29f3730"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const mensalidade = 28;

// 🔥 CARREGAR JOGADORES DO FIREBASE
async function carregarJogadores(){

let tabela = document.getElementById("tabela");

// limpa (menos cabeçalho)
tabela.innerHTML = `
<tr>
<th class="nome">Jogador</th>
<th>14/03</th>
<th>21/03</th>
<th>28/03</th>
<th>04/04</th>
<th>Ação</th>
</tr>`;

const querySnapshot = await getDocs(collection(db, "jogadores"));

querySnapshot.forEach(docSnap=>{

let j = docSnap.data();

let tr = document.createElement("tr");

tr.innerHTML = `
<td class="nome jogador ${j.pago ? 'pago':''}" data-id="${docSnap.id}">
${j.pago ? '✔ ' : ''}${j.nome}
</td>
<td class="presenca">-</td>
<td class="presenca">-</td>
<td class="presenca">-</td>
<td class="presenca">-</td>
<td><button onclick="removerJogador('${docSnap.id}')">X</button></td>`;

tabela.appendChild(tr);

});

ativarEventos();
atualizarFinanceiro();
}

// 🔥 ADICIONAR
window.adicionarJogador = async function(){

let nome = prompt("Nome do jogador:");
if(!nome) return;

await addDoc(collection(db,"jogadores"),{
nome:nome,
pago:false
});

carregarJogadores();
}

// 🔥 PAGAR
function ativarEventos(){

document.querySelectorAll(".jogador").forEach(el=>{

el.onclick = async ()=>{

let id = el.getAttribute("data-id");

let pago = el.classList.contains("pago");

await updateDoc(doc(db,"jogadores",id),{
pago:!pago
});

carregarJogadores();

};

});
}

// 🔥 REMOVER
window.removerJogador = async function(id){

if(!confirm("Remover jogador?")) return;

await deleteDoc(doc(db,"jogadores",id));

carregarJogadores();
}

// 🔥 FINANCEIRO (mantido)
function atualizarFinanceiro(){

let total=0, pagos=0;

document.querySelectorAll(".jogador").forEach(el=>{
if(el.classList.contains("pago")){
total+=mensalidade;
pagos++;
}
});

document.getElementById("entrada").innerText = "R$ "+total;
document.getElementById("saldo").innerText = "R$ "+total;

document.getElementById("qtdPagamentos").innerText = pagos+" pagamentos";
document.getElementById("statusPagamentos").innerText = pagos+" de "+document.querySelectorAll(".jogador").length+" pagos";

let percent = Math.round((pagos/(document.querySelectorAll(".jogador").length||1))*100);
document.getElementById("percentual").innerText = percent+"%";
document.getElementById("barra").style.width = percent+"%";
}

// INIT
carregarJogadores();

</script>

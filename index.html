<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GameOver ⚽</title>
</head>

<body>

<h2>⚽ GameOver</h2>

<!-- BOTÃO SECRETO ADMIN -->
<button onclick="mostrarLogin()" 
style="position:fixed; bottom:10px; right:10px;">
⚙️
</button>

<!-- LOGIN (ESCONDIDO) -->
<div id="login-area" style="display:none;">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="admin-area" style="display:none;">
  <h3>Admin</h3>
  <button onclick="addJogador()">➕ Adicionar Jogador</button>
</div>

<!-- LISTA -->
<h3>Jogadores</h3>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// 🔥 SEU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCXfa8We_LZvheRJW763NRUfPqryqg84YA",
  authDomain: "klintonhansgameover.firebaseapp.com",
  projectId: "klintonhansgameover",
  storageBucket: "klintonhansgameover.firebasestorage.app",
  messagingSenderId: "456440883345",
  appId: "1:456440883345:web:0130c2c5874a1dd29f3730"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// MOSTRAR LOGIN (BOTÃO ⚙️)
window.mostrarLogin = function () {
  const area = document.getElementById("login-area");
  area.style.display = area.style.display === "none" ? "block" : "none";
};

// LOGIN ADMIN
window.login = async function () {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    alert("Logado como admin!");
    carregarJogadores();
  } catch (e) {
    alert("Erro no login");
    console.error(e);
  }
};

// CONTROLE ADMIN
let isAdmin = false;

onAuthStateChanged(auth, (user) => {
  if (user) {
    isAdmin = true;
    document.getElementById("admin-area").style.display = "block";
  }
});

// LISTAR JOGADORES (VISITANTE + ADMIN)
async function carregarJogadores() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "jogadores"));

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;

    const li = document.createElement("li");

    li.innerHTML = `
      ${data.nome} - ${data.pago ? "✅ Pago" : "❌ Pendente"}
      ${isAdmin ? `
        <button onclick="pagar('${id}', ${data.pago})">💰</button>
        <button onclick="remover('${id}')">❌</button>
      ` : ""}
    `;

    lista.appendChild(li);
  });
}

// ADICIONAR
window.addJogador = async function () {
  const nome = prompt("Nome do jogador:");
  if (!nome) return;

  await addDoc(collection(db, "jogadores"), {
    nome: nome,
    pago: false
  });

  carregarJogadores();
};

// PAGAR
window.pagar = async function (id, statusAtual) {
  const ref = doc(db, "jogadores", id);

  await updateDoc(ref, {
    pago: !statusAtual
  });

  carregarJogadores();
};

// REMOVER
window.remover = async function (id) {
  await deleteDoc(doc(db, "jogadores", id));
  carregarJogadores();
};

// INICIAL
carregarJogadores();
</script>

</body>
</html>
